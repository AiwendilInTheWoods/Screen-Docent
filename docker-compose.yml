services:
  art-curator:
    build: .
    container_name: art-curator
    ports:
      - "8000:8000"
    volumes:
      # Map the local artwork library for persistence
      - ./Artwork:/app/Artwork
      # Map the data directory for SQLite database persistence
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
